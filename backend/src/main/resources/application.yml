spring:
  application:
    name: exchange-rate-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/exchange_rates}
    username: ${DATABASE_USER:exchange}
    password: ${DATABASE_PASSWORD:exchange}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.2}
          temperature: 0.3

server:
  port: ${SERVER_PORT:8080}

fixer:
  api-key: ${FIXER_API_KEY:}
  base-url: ${FIXER_BASE_URL:https://data.fixer.io/api}
  base-currency: ${FIXER_BASE_CURRENCY:EUR}
  startup-enabled: ${FIXER_STARTUP_ENABLED:true}
  startup-backfill-days: ${FIXER_STARTUP_BACKFILL_DAYS:30}

app:
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  sample-rates-enabled: ${SAMPLE_RATES_ENABLED:true}
  sample-rates-days: ${SAMPLE_RATES_DAYS:30}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.marcura: INFO
